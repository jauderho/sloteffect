<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sloteffect — slot-machine rolls for React</title>
    <meta
      name="description"
      content="Stock-Events-style slot-machine rolls for numbers, letters, and text in React. Dependency-free, accessible, reduced-motion aware."
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@400;500;600;700&display=swap");

      :root[data-theme="dark"] {
        --bg: #0a0b0d;
        --surface: #15181d;
        --surface2: #1b1f26;
        --border: #262b34;
        --border2: #333a45;
        --text: #f4f3f0;
        --text2: #b9bcc4;
        --text3: #7e8390;
        --gold: #d4b87a;
        --gold-bg: rgba(212, 184, 122, 0.1);
        --on-gold: #1a1408;
        --good: #5ed6a4;
      }
      :root[data-theme="light"] {
        --bg: #f7f4ee;
        --surface: #ffffff;
        --surface2: #f3efe6;
        --border: #e2dccf;
        --border2: #d4ccbb;
        --text: #1a1814;
        --text2: #4b4742;
        --text3: #857f74;
        --gold: #9a7b2e;
        --gold-bg: rgba(154, 123, 46, 0.08);
        --on-gold: #ffffff;
        --good: #1f8a5b;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Hanken Grotesk", "Noto Sans TC", ui-sans-serif,
          system-ui, sans-serif;
        font-variant-numeric: tabular-nums;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
        transition: background 0.25s ease, color 0.25s ease;
      }
      :lang(zh) {
        font-family: "Noto Sans TC", "Hanken Grotesk", ui-sans-serif,
          system-ui, sans-serif;
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: clamp(20px, 5vw, 48px) clamp(16px, 4vw, 28px) 64px;
      }

      header.site {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: clamp(28px, 6vw, 48px);
      }
      .wordmark {
        font-family: "Newsreader", "Noto Serif TC", serif;
        font-weight: 500;
        font-size: clamp(28px, 5vw, 42px);
        letter-spacing: -0.01em;
        margin: 0;
        line-height: 1.1;
      }
      .tagline {
        color: var(--text2);
        font-size: 14px;
        margin: 6px 0 0;
        max-width: 46ch;
      }

      .toolbar {
        display: flex;
        gap: 8px;
      }
      .icon-btn,
      .lang-btn {
        min-height: 44px;
        min-width: 44px;
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        background: var(--surface2);
        color: var(--text2);
        border: 1px solid var(--border);
        border-radius: 10px;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease,
          border-color 0.15s ease;
      }
      .icon-btn:hover,
      .lang-btn:hover {
        border-color: var(--border2);
        color: var(--text);
      }
      :focus-visible {
        outline: 2px solid var(--gold);
        outline-offset: 2px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid var(--gold);
        border-radius: 16px;
        padding: clamp(20px, 4vw, 28px);
        margin-bottom: 20px;
      }
      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 0 0 14px;
      }
      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--gold);
        margin: 0;
      }
      .help {
        position: relative;
      }
      .help-btn {
        width: 44px;
        height: 44px;
        min-height: 44px;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: help;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .help-dot {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 1px solid var(--border2);
        background: var(--surface2);
        color: var(--text3);
        font-size: 13px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: color 0.15s ease, border-color 0.15s ease;
      }
      .help-btn:hover .help-dot,
      .help-btn:focus-visible .help-dot {
        color: var(--gold);
        border-color: var(--gold);
      }
      .tip {
        position: absolute;
        right: 0;
        top: calc(100% - 6px);
        z-index: 5;
        width: max-content;
        max-width: min(360px, 78vw);
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 12.5px;
        line-height: 1.55;
        color: var(--text2);
        white-space: normal;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-4px);
        transition: opacity 0.15s ease, transform 0.15s ease,
          visibility 0.15s ease;
      }
      code {
        font-family: inherit;
      }
      .tip-code {
        display: block;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        color: var(--text);
        word-break: break-word;
      }
      .tip-label {
        display: block;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text3);
        margin: 0 0 8px;
      }
      .help:hover .tip,
      .help:focus-within .tip {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }
      .hero {
        font-family: "Newsreader", "Noto Serif TC", serif;
        font-weight: 500;
        font-size: clamp(40px, 11vw, 72px);
        line-height: 1.2;
        color: var(--text);
        min-height: 1.2em;
        display: flex;
        align-items: center;
      }
      .context {
        color: var(--text2);
        font-size: 14px;
        margin: 10px 0 18px;
        min-height: 1.4em;
      }

      .seg {
        display: inline-flex;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 4px;
        gap: 4px;
      }
      .seg-btn {
        min-height: 36px;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--text2);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .seg-btn:hover {
        color: var(--text);
      }
      .seg-btn.active {
        background: var(--gold);
        color: var(--on-gold);
      }
      .seg-label {
        display: block;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text3);
        margin: 0 0 8px;
      }

      footer.site {
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        font-size: 13px;
      }
      footer.site a {
        color: var(--text2);
        text-decoration: none;
        font-weight: 600;
      }
      footer.site a:hover {
        color: var(--gold);
      }

      @media (max-width: 480px) {
        .seg {
          width: 100%;
        }
        .seg-btn {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root" class="wrap"></div>

    <script
      crossorigin
      src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef, useLayoutEffect } = React;

      // ---- sloteffect (inline port of src/, kept in sync) -------------------
      const DIGITS = "0123456789";
      const UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const LOWER = "abcdefghijklmnopqrstuvwxyz";
      const ROW_H = 1.3;
      const SLOT_EASING =
        "linear(0, 0.0548, 0.1842, 0.3463, 0.5118, 0.6628, 0.7895, 0.8885, 0.9605, " +
        "1.0086, 1.0372, 1.051, 1.0542, 1.0508, 1.0435, 1.0346, 1.0256, 1.0176, " +
        "1.0108, 1.0056, 1.0018, 0.9993, 0.9979, 0.9972, 0.9971, 1)";

      function charsetOf(ch) {
        if (ch >= "0" && ch <= "9") return DIGITS;
        if (ch >= "A" && ch <= "Z") return UPPER;
        if (ch >= "a" && ch <= "z") return LOWER;
        return null;
      }
      function sharedCharset(from, to) {
        const cs = charsetOf(from);
        return cs && cs === charsetOf(to) ? cs : null;
      }
      function forwardPath(cs, from, to) {
        const len = cs.length, fi = cs.indexOf(from), ti = cs.indexOf(to);
        const steps = (ti - fi + len) % len || len;
        const rows = [];
        for (let k = 0; k <= steps; k++) rows.push(cs[(fi + k) % len]);
        return rows;
      }
      function backwardPath(cs, from, to) {
        const len = cs.length, fi = cs.indexOf(from), ti = cs.indexOf(to);
        const steps = (fi - ti + len) % len || len;
        const rows = [];
        for (let k = 0; k <= steps; k++) rows.push(cs[(fi - k + len) % len]);
        return rows;
      }
      function buildRoll(from, to, direction, coin) {
        const rollUp = direction === "both" ? coin < 0.5 : direction === "up";
        const cs = sharedCharset(from, to);
        if (rollUp) {
          const rows = cs ? forwardPath(cs, from, to) : [from, to];
          return { rows, startRow: 0, endRow: rows.length - 1 };
        }
        const rows = (cs ? backwardPath(cs, from, to) : [from, to]).reverse();
        return { rows, startRow: rows.length - 1, endRow: 0 };
      }
      const rollDuration = () => 750 + Math.random() * 300;
      const prefersReducedMotion = () =>
        window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const HOST_STYLE = {
        position: "relative",
        display: "inline-block",
        overflow: "hidden",
        height: ROW_H + "em",
        lineHeight: 1,
        verticalAlign: "middle",
        whiteSpace: "pre",
      };
      const GLYPH_STYLE = {
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        height: ROW_H + "em",
        lineHeight: 1,
      };
      const ROW_CSS =
        "display:flex;align-items:center;justify-content:center;height:" +
        ROW_H +
        "em;line-height:1";

      // At rest a cell is one naturally-sized glyph; the rolling strip is built
      // imperatively only during a transition, then torn down.
      function SlotCell({ glyph, direction }) {
        const hostRef = useRef(null);
        const glyphRef = useRef(null);
        const rollerRef = useRef(null);
        const prevRef = useRef(glyph);

        useLayoutEffect(() => {
          const from = prevRef.current;
          const to = glyph;
          prevRef.current = to;
          const host = hostRef.current;
          const rest = glyphRef.current;
          if (!host || !rest) return;

          const clear = () => {
            const roller = rollerRef.current;
            if (roller) {
              for (const a of roller.getAnimations()) a.cancel();
              roller.remove();
              rollerRef.current = null;
            }
            rest.style.visibility = "";
          };

          if (from === to || prefersReducedMotion()) {
            clear();
            return;
          }
          clear();

          const { rows, startRow, endRow } = buildRoll(
            from,
            to,
            direction,
            Math.random(),
          );
          const roller = document.createElement("span");
          roller.setAttribute("aria-hidden", "true");
          roller.style.cssText =
            "position:absolute;left:0;top:0;width:100%;will-change:transform";
          for (const ch of rows) {
            const row = document.createElement("span");
            row.style.cssText = ROW_CSS;
            row.textContent = ch;
            roller.appendChild(row);
          }
          rest.style.visibility = "hidden";
          host.appendChild(roller);
          rollerRef.current = roller;

          const at = (i) => `translateY(${-(i * ROW_H)}em)`;
          roller.style.transform = at(endRow);
          const anim = roller.animate(
            [{ transform: at(startRow) }, { transform: at(endRow) }],
            { duration: rollDuration(), easing: SLOT_EASING },
          );
          anim.onfinish = () => {
            if (rollerRef.current === roller) clear();
          };
          return clear;
        }, [glyph, direction]);

        return (
          <span ref={hostRef} style={HOST_STYLE}>
            <span ref={glyphRef} style={GLYPH_STYLE}>
              {glyph}
            </span>
          </span>
        );
      }

      function segment(text) {
        if (typeof Intl !== "undefined" && "Segmenter" in Intl) {
          const seg = new Intl.Segmenter(undefined, { granularity: "grapheme" });
          return Array.from(seg.segment(text), (s) => s.segment);
        }
        return Array.from(text);
      }

      function SlotText({ text, direction = "both", dir = "auto", style }) {
        const label = String(text);
        const cells = segment(label);
        const n = cells.length;
        return (
          <span
            role="img"
            aria-label={label}
            dir={dir}
            style={{ display: "inline-block", whiteSpace: "pre", ...style }}
          >
            {cells.map((g, i) => (
              <SlotCell key={`c${n - i}`} glyph={g} direction={direction} />
            ))}
          </span>
        );
      }

      function SlotLetter({ char, direction = "both", style }) {
        const ch = Array.from(String(char))[0] ?? "";
        return (
          <span
            role="img"
            aria-label={ch}
            style={{ display: "inline-block", ...style }}
          >
            <SlotCell glyph={ch} direction={direction} />
          </span>
        );
      }

      function SlotNumber({
        value,
        format,
        locales = "en-US",
        suffix = "",
        direction = "both",
        style,
      }) {
        const formatted =
          typeof value === "string"
            ? value
            : new Intl.NumberFormat(locales, format).format(value);
        return (
          <SlotText text={formatted + suffix} direction={direction} style={style} />
        );
      }

      // ---- demo plumbing ----------------------------------------------------
      const STRINGS = {
        en: {
          lang: "中文",
          tagline:
            "Stock-Events-style slot-machine rolls for numbers, letters, and text in React. Dependency-free, accessible, reduced-motion aware.",
          theme: "Theme",
          direction: "Direction",
          dir: { both: "Both", up: "Up", down: "Down" },
          numberEyebrow: "SlotNumber",
          numberCtx: "Any number type — currency, percent, compact, negatives — via Intl.NumberFormat. Digits roll; symbols hold.",
          letterEyebrow: "SlotLetter",
          letterCtx: "A single character rolling through its alphabet, wrapping around.",
          textEyebrow: "SlotText",
          textCtx: "Any script — Latin, CJK, emoji, right-to-left. Each grapheme rolls; spacing stays natural.",
          install: "Install",
          usage: "Usage",
        },
        zh: {
          lang: "EN",
          tagline:
            "為 React 打造的拉霸式數字滾動效果，靈感來自 Stock Events。零依賴、可存取、並支援減少動態偏好。",
          theme: "主題",
          direction: "方向",
          dir: { both: "雙向", up: "向上", down: "向下" },
          numberEyebrow: "SlotNumber",
          numberCtx: "任何數字類型——貨幣、百分比、精簡格式、負數——透過 Intl.NumberFormat。數字滾動，符號不動。",
          letterEyebrow: "SlotLetter",
          letterCtx: "單一字元在字母表中循環滾動。",
          textEyebrow: "SlotText",
          textCtx: "任何文字——拉丁、中日韓、表情符號、由右至左。每個字元各自滾動，排版自然。",
          install: "安裝",
          usage: "用法",
        },
      };

      // Usage snippets shown in each card's "?" tooltip (code, not localized).
      const USAGE = {
        number:
          '<SlotNumber value={1234} format={{ style: "currency", currency: "USD" }} direction="up" />',
        letter: '<SlotLetter char="Q" direction="down" />',
        text: '<SlotText text="東京タワー" direction="both" />',
      };

      const NUMBERS = [1234, 13190, 597, 5970000, 81293, 42];
      const LETTERS = ["A", "Q", "Z", "M", "E", "R", "S"];
      // Mixed scripts, emoji, and a right-to-left phrase to show SlotText handles
      // any text and writing direction.
      const WORDS = ["JACKPOT", "WINNER", "777 GOLD", "東京タワー", "שלום עולם", "🍒🔔💎"];
      const PAUSE = 1900;

      function useCycle(values) {
        const [i, setI] = useState(0);
        useEffect(() => {
          const id = setInterval(
            () => setI((p) => (p + 1) % values.length),
            PAUSE,
          );
          return () => clearInterval(id);
        }, [values.length]);
        return values[i];
      }

      function DirectionControl({ value, onChange, t }) {
        return (
          <div>
            <span className="seg-label">{t.direction}</span>
            <div className="seg" role="group" aria-label={t.direction}>
              {["both", "up", "down"].map((o) => (
                <button
                  key={o}
                  type="button"
                  className={"seg-btn" + (value === o ? " active" : "")}
                  aria-pressed={value === o}
                  onClick={() => onChange(o)}
                >
                  {t.dir[o]}
                </button>
              ))}
            </div>
          </div>
        );
      }

      function DemoCard({ eyebrow, context, dir, setDir, t, usage, children }) {
        const tipId = "tip-" + eyebrow;
        return (
          <section className="card">
            <div className="card-head">
              <p className="eyebrow">{eyebrow}</p>
              <span className="help">
                <button
                  type="button"
                  className="help-btn"
                  aria-label={t.usage}
                  aria-describedby={tipId}
                >
                  <span className="help-dot" aria-hidden="true">
                    ?
                  </span>
                </button>
                <span className="tip" role="tooltip" id={tipId}>
                  <span className="tip-label">{t.usage}</span>
                  <code className="tip-code">{usage}</code>
                </span>
              </span>
            </div>
            <div className="hero">{children}</div>
            <p className="context">{context}</p>
            <DirectionControl value={dir} onChange={setDir} t={t} />
          </section>
        );
      }

      const store = {
        get(k, fb) {
          try {
            return localStorage.getItem(k) ?? fb;
          } catch {
            return fb;
          }
        },
        set(k, v) {
          try {
            localStorage.setItem(k, v);
          } catch {}
        },
      };

      function App() {
        const [theme, setTheme] = useState(() => store.get("se-theme", "dark"));
        const [lang, setLang] = useState(() => store.get("se-lang", "en"));
        const [numDir, setNumDir] = useState("both");
        const [letterDir, setLetterDir] = useState("both");
        const [textDir, setTextDir] = useState("both");

        useEffect(() => {
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.setAttribute("lang", lang);
          store.set("se-theme", theme);
          store.set("se-lang", lang);
        }, [theme, lang]);

        const t = STRINGS[lang];
        const numValue = useCycle(NUMBERS);
        const letterValue = useCycle(LETTERS);
        const textValue = useCycle(WORDS);

        return (
          <React.Fragment>
            <header className="site">
              <div>
                <h1 className="wordmark">sloteffect</h1>
                <p className="tagline">{t.tagline}</p>
              </div>
              <div className="toolbar">
                <button
                  type="button"
                  className="lang-btn"
                  onClick={() => setLang(lang === "en" ? "zh" : "en")}
                  aria-label="Toggle language"
                >
                  {t.lang}
                </button>
                <button
                  type="button"
                  className="icon-btn"
                  onClick={() => setTheme(theme === "dark" ? "light" : "dark")}
                  aria-label={t.theme}
                >
                  {theme === "dark" ? "☀" : "☾"}
                </button>
              </div>
            </header>

            <DemoCard
              eyebrow={t.numberEyebrow}
              context={t.numberCtx}
              dir={numDir}
              setDir={setNumDir}
              usage={USAGE.number}
              t={t}
            >
              <SlotNumber
                value={numValue}
                format={{
                  style: "currency",
                  currency: "USD",
                  maximumFractionDigits: 0,
                }}
                direction={numDir}
              />
            </DemoCard>

            <DemoCard
              eyebrow={t.letterEyebrow}
              context={t.letterCtx}
              dir={letterDir}
              setDir={setLetterDir}
              usage={USAGE.letter}
              t={t}
            >
              <SlotLetter char={letterValue} direction={letterDir} />
            </DemoCard>

            <DemoCard
              eyebrow={t.textEyebrow}
              context={t.textCtx}
              dir={textDir}
              setDir={setTextDir}
              usage={USAGE.text}
              t={t}
            >
              <SlotText text={textValue} direction={textDir} />
            </DemoCard>

            <footer className="site">
              <a href="https://www.npmjs.com/package/sloteffect">npm</a>
              <a href="https://github.com/jauderho/sloteffect">GitHub</a>
              <span style={{ color: "var(--text3)" }}>
                {t.install}: <code>npm i sloteffect</code>
              </span>
            </footer>
          </React.Fragment>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
