    <style>

    <script

      src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"

    <script

    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useMemo, useRef, useLayoutEffect } = React;

      // ---- sloteffect (inline port of src/, kept in sync) -------------------
      const DIGITS = "0123456789";
      const UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const LOWER = "abcdefghijklmnopqrstuvwxyz";
      const ROW_H = 1.3;
      const SLOT_EASING =
        "linear(0, 0.0208, 0.0752, 0.1525, 0.2439, 0.3422, 0.4417, 0.5382, 0.6286, " +
        "0.711, 0.7839, 0.847, 0.9002, 0.944, 0.9789, 1.0058, 1.0257, 1.0395, " +
        "1.0483, 1.0529, 1.0543, 1.0532, 1.0502, 1.046, 1.041, 1.0357, 1.0303, " +
        "1.0251, 1.0202, 1.0157, 1.0117, 1.0083, 1.0054, 1.003, 1.0011, 0.9997, " +
        "0.9986, 0.9979, 0.9974, 0.9971, 0.9971, 0.9971, 0.9973, 0.9975, 0.9978, " +
        "0.9981, 0.9984, 0.9986, 0.9989, 0.9991, 0.9994, 0.9995, 0.9997, 0.9998, " +
        "0.9999, 1, 1.0001, 1.0001, 1.0001, 1.0002, 1)";
      // A more damped spring (~2.7% overshoot) — half the bounce; used for
      // counter mode's gentler settle.
      const SLOT_EASING_SOFT =
        "linear(0, 0.0253, 0.0896, 0.1778, 0.2787, 0.3835, 0.486, 0.582, 0.6689, " +
        "0.7454, 0.8108, 0.8655, 0.9101, 0.9454, 0.9727, 0.993, 1.0075, 1.0173, " +
        "1.0232, 1.0263, 1.0272, 1.0265, 1.0247, 1.0223, 1.0196, 1.0167, 1.014, " +
        "1.0114, 1.009, 1.0069, 1.0051, 1.0037, 1.0024, 1.0015, 1.0007, 1.0002, " +
        "0.9998, 0.9995, 0.9994, 0.9993, 0.9993, 0.9993, 0.9993, 0.9994, 0.9995, " +
        "0.9995, 0.9996, 0.9997, 0.9998, 0.9998, 0.9999, 0.9999, 0.9999, 1, 1, 1, " +
        "1, 1, 1, 1, 1)";

      function charsetOf(ch) {
        if (ch >= "0" && ch <= "9") return DIGITS;
        if (ch >= "A" && ch <= "Z") return UPPER;
        if (ch >= "a" && ch <= "z") return LOWER;
        return null;
      }
      function sharedCharset(from, to) {
        const cs = charsetOf(from);
        return cs && cs === charsetOf(to) ? cs : null;
      }
      // `cycles` prepends extra full revolutions (faster spin, same duration).
      function forwardPath(cs, from, to, cycles = 0) {
        const len = cs.length, fi = cs.indexOf(from), ti = cs.indexOf(to);
        const steps = ((ti - fi + len) % len || len) + cycles * len;
        const rows = [];
        for (let k = 0; k <= steps; k++) rows.push(cs[(fi + k) % len]);
        return rows;
      }
      function backwardPath(cs, from, to, cycles = 0) {
        const len = cs.length, fi = cs.indexOf(from), ti = cs.indexOf(to);
        const steps = ((fi - ti + len) % len || len) + cycles * len;
        const rows = [];
        for (let k = 0; k <= steps; k++)
          rows.push(cs[(((fi - k) % len) + len) % len]);
        return rows;
      }
      function buildRoll(from, to, direction, coin, fill = [], cycles = 0) {
        const rollUp = direction === "both" ? coin < 0.5 : direction === "up";
        const cs = sharedCharset(from, to);
        const path = cs
          ? rollUp
            ? forwardPath(cs, from, to, cycles)
            : backwardPath(cs, from, to, cycles)
          : [from, ...fill, to];
        if (rollUp) return { rows: path, startRow: 0, endRow: path.length - 1 };
        const rows = path.slice().reverse();
        return { rows, startRow: rows.length - 1, endRow: 0 };
      }
      const rollDuration = (coin = Math.random()) => 750 + coin * 300;
      // Gear-reduction odometer: each digit advances from the previous value by
      // however many of its own place-steps the value crossed — low places blur,
      // high places barely move. Revolutions capped so fast scrubs stay sane.
      const COUNTER_CYCLE_CAP = 6;
      function odometerDigit(prev, cur, place, cap = COUNTER_CYCLE_CAP) {
        const p = 10 ** place;
        const pv = Math.floor(prev / p);
        const steps = Math.floor(cur / p) - pv;
        return {
          from: String((((pv % 10) + 10) % 10)),
          cycles: Math.min(cap, Math.floor(Math.abs(steps) / 10)),
        };
      }
      function hashSeed(str) {
        let h = 2166136261;
        for (let i = 0; i < str.length; i++) {
          h ^= str.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      }
      function makeRng(seed) {
        let s = seed >>> 0;
        return () => {
          s = (s + 0x6d2b79f5) | 0;
          let t = Math.imul(s ^ (s >>> 15), 1 | s);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      const STEADY_COIN = 0.5;
      const prefersReducedMotion = () =>
        window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const SPIN_LENGTH = 6;
      const DEFAULT_SPIN_POOL =
        "的一是不了人我在有他這為之大來以個中上們到說國和地也子時道出而要於就下得可你年生自會那後能對著事其裡所去行過家十用發天如然作方成者多日都三小軍二無同麼經法當起與好看學進種將還分此心前面又定見只主沒公從金東風花雨山水火土木月日星雲海";
      function isIdeograph(ch) {
        const cp = ch.codePointAt(0) || 0;
        return (
          (cp >= 0x3400 && cp <= 0x9fff) ||
          (cp >= 0xf900 && cp <= 0xfaff) ||
          (cp >= 0x20000 && cp <= 0x2fa1f)
        );
      }
      const isEmoji = (ch) => /\p{Extended_Pictographic}/u.test(ch);
      // A reel only rolls between graphemes of the same kind, and never for the
      // non-rolling kinds emoji/symbol — so currency symbols, separators, and
      // emoji always swap statically while letters and ideographs roll/flip.
      function glyphKind(ch) {
        if (isEmoji(ch)) return "emoji";
        const cs = charsetOf(ch);
        if (cs) return cs;
        if (isIdeograph(ch)) return "ideograph";
        return /\p{Letter}/u.test(ch) ? "letter" : "symbol";
      }
      const STATIC_KINDS = new Set(["emoji", "symbol"]);
      function sampleSpin(pool, n, rand = Math.random) {
        const chars = Array.from(pool);
        const out = [];
        for (let i = 0; i < n; i++)
          out.push(chars[Math.floor(rand() * chars.length)]);
        return out;
      }
      function randomGlyph(pool, exclude = "", rand = Math.random) {
        const choices = pool.filter((g) => g !== exclude);
        const from = choices.length ? choices : pool;
        return from[Math.floor(rand() * from.length)] ?? "";
      }
      // Decide how `target` animates from the aligned previous grapheme
      // `source`: same-kind sources roll from their real value, otherwise a
      // same-kind start glyph is synthesized so every changed grapheme spins.
      // Emoji, symbols, and unchanged graphemes return null (shown statically).
      function chooseReel(target, source, letterPool, spinPool, rand = Math.random) {
        const kind = glyphKind(target);
        if (STATIC_KINDS.has(kind)) return null;
        const cs = charsetOf(target);
        const usable =
          source && !isEmoji(source) && glyphKind(source) === kind;
        const from = usable
          ? source
          : randomGlyph(
              cs
                ? Array.from(cs)
                : isIdeograph(target)
                  ? Array.from(spinPool)
                  : letterPool,
              target,
              rand,
            );
        if (!from || from === target) return null;
        const fill = cs
          ? []
          : isIdeograph(target)
            ? sampleSpin(spinPool, SPIN_LENGTH, rand)
            : sampleSpin(letterPool.join(""), SPIN_LENGTH, rand);
        return { from, fill };
      }

      // One reused grapheme segmenter (constructing one per call is costly).
      const SEGMENTER =
        typeof Intl !== "undefined" && "Segmenter" in Intl
          ? new Intl.Segmenter(undefined, { granularity: "grapheme" })
          : null;

      function segmentWithOffsets(text) {
        const out = [];
        if (SEGMENTER) {
          for (const s of SEGMENTER.segment(text))
            out.push({ g: s.segment, start: s.index });
          return out;
        }
        let i = 0;
        for (const ch of text) {
          out.push({ g: ch, start: i });
          i += ch.length;
        }
        return out;
      }

      // Resting text is one kerned run; on change, overlay measured reels at each
      // grapheme's real (kerned) box so spacing/kerning/RTL match normal text.
      function resolveBackground(el) {
        let node = el;
        while (node) {
          const bg = getComputedStyle(node).backgroundColor;
          if (bg && bg !== "transparent" && !bg.startsWith("rgba(0, 0, 0, 0"))
            return bg;
          node = node.parentElement;
        }
        return getComputedStyle(document.body).backgroundColor || "#fff";
      }

      function SlotText({
        text,
        direction = "both",
        dir = "auto",
        spinPool = DEFAULT_SPIN_POOL,
        randomSpin = false,
        digitCycles,
        digitFrom,
        easing = SLOT_EASING,
        style,
      }) {
        const label = String(text);
        const hostRef = useRef(null);
        const textRef = useRef(null);
        const layerRef = useRef(null);
        const cellsRef = useRef([]);

        useLayoutEffect(() => {
          const host = hostRef.current;
          const textEl = textRef.current;
          const layer = layerRef.current;
          if (!host || !textEl || !layer) return;

          // Wipe the previous value's reels before spinning this one in.
          const wipe = () => {
            for (const c of cellsRef.current) {
              for (const a of c.getAnimations({ subtree: true })) a.cancel();
              c.remove();
            }
            cellsRef.current = [];
          };

          // Measure + build the reels. Re-runnable so we rebuild once the web
          // fonts load — boxes first measured against a fallback font would
          // otherwise leave the cells (and the cents group) mispositioned.
          const build = () => {
          wipe();

          const node = textEl.firstChild;
          if (!node || prefersReducedMotion()) {
            textEl.style.visibility = "visible";
            return;
          }

          // Off → a per-value seed makes the roll identical every play; on →
          // truly random. Drives start glyph, spin glyphs, and direction.
          const rand = randomSpin ? Math.random : makeRng(hashSeed(label));

          const toG = segmentWithOffsets(label);
          const hostRect = host.getBoundingClientRect();
          const bg = resolveBackground(host);
          // Lift each reel cell by the row's half-leading so it sits exactly on
          // the measured glyph box.
          const lead =
            ((ROW_H - 1) / 2) * parseFloat(getComputedStyle(host).fontSize);

          // Other-script letters spin through this value's own same-kind glyphs.
          const letterPool = [
            ...new Set(
              toG.map((x) => x.g).filter((g) => glyphKind(g) === "letter"),
            ),
          ];

          // Measure every grapheme's kerned box first (reads), then build all
          // cells (writes), to avoid a forced reflow per glyph.
          const plans = [];
          let digitIdx = 0;
          for (const { g, start } of toG) {
            const isDigit = charsetOf(g) === DIGITS;
            let cycles = 0, reel;
            if (isDigit) {
              const i = digitIdx++;
              cycles = digitCycles?.[i] ?? 0;
              if (digitFrom) {
                // Odometer mode: roll from the supplied previous digit; an
                // unchanged digit with no extra revolutions holds still.
                const from = digitFrom[i] ?? g;
                reel = from === g && cycles === 0 ? null : { from, fill: [] };
              } else {
                reel = chooseReel(g, null, letterPool, spinPool, rand);
              }
            } else {
              reel = chooseReel(g, null, letterPool, spinPool, rand);
            }
            if (!reel && g.trim() === "") continue; // whitespace: nothing to show
            const range = document.createRange();
            range.setStart(node, start);
            range.setEnd(node, start + g.length);
            plans.push({ g, reel, rect: range.getBoundingClientRect(), cycles });
          }

          // Hide the measured text; the cells are now the resting glyphs.
          textEl.style.visibility = "hidden";

          const cells = [];
          const at = (i) => `translateY(${-(i * ROW_H)}em)`;
          for (const { g, reel, rect, cycles } of plans) {
            const cell = document.createElement("span");
            cell.setAttribute("aria-hidden", "true");
            const left = rect.left - hostRect.left;
            const top = rect.top - hostRect.top;

            if (!reel) {
              // A symbol (currency, separator, punctuation): render statically.
              cell.style.cssText =
                "position:absolute;left:" +
                left +
                "px;top:" +
                top +
                "px;line-height:1;white-space:pre";
              cell.textContent = g;
              layer.appendChild(cell);
              cells.push(cell);
              continue;
            }

            cell.style.cssText =
              "position:absolute;left:" +
              left +
              "px;top:" +
              (top - lead) +
              "px;width:" +
              rect.width +
              "px;height:" +
              ROW_H +
              "em;overflow:hidden;background:" +
              bg;

            const { rows, startRow, endRow } = buildRoll(
              reel.from,
              g,
              direction,
              rand(),
              reel.fill,
              cycles,
            );
            // One multi-line text node (each line is a ROW_H-tall reel row)
            // instead of a span per glyph: O(1) DOM nodes per reel.
            const strip = document.createElement("span");
            strip.style.cssText =
              "position:absolute;left:0;top:0;width:100%;white-space:pre;line-height:" +
              ROW_H +
              ";will-change:transform";
            strip.textContent = rows.join("\n");
            cell.appendChild(strip);
            // Land on the final glyph and stay — the reel is the rest state.
            strip.style.transform = at(endRow);
            // randomSpin staggers each settle; otherwise all settle as one.
            const duration = rollDuration(randomSpin ? Math.random() : STEADY_COIN);
            // Keep the strip promoted (will-change stays) so finishing never
            // triggers a layer de-promotion repaint (a final flicker).
            strip.animate(
              [{ transform: at(startRow) }, { transform: at(endRow) }],
              { duration, easing },
            );
            layer.appendChild(cell);
            cells.push(cell);
          }

          cellsRef.current = cells;
          };

          build();

          // Rebuild once fonts are ready (no-op if already loaded), then clean up.
          let active = true;
          const fonts = typeof document !== "undefined" ? document.fonts : null;
          if (fonts && fonts.status !== "loaded")
            fonts.ready.then(() => { if (active) build(); });

          return () => { active = false; wipe(); };
        }, [label, direction, spinPool, randomSpin, digitCycles, digitFrom, easing]);

        return (
          <span
            ref={hostRef}
            role="img"
            aria-label={label}
            dir={dir}
            style={{
              position: "relative",
              display: "inline-block",
              whiteSpace: "pre",
              lineHeight: ROW_H,
              fontKerning: "normal",
              textRendering: "optimizeLegibility",
              ...style,
            }}
          >
            <span ref={textRef}>{label}</span>
            <span
              ref={layerRef}
              aria-hidden="true"
              style={{
                position: "absolute",
                left: 0,
                top: 0,
                pointerEvents: "none",
              }}
            />
          </span>
        );
      }

      function SlotLetter({
        char,
        direction = "both",
        spinPool,
        randomSpin = false,
        style,
      }) {
        const ch = Array.from(String(char))[0] ?? "";
        return (
          <SlotText
            text={ch}
            direction={direction}
            spinPool={spinPool}
            randomSpin={randomSpin}
            style={style}
          />
        );
      }

      function SlotNumber({
        value,
        format,
        locales = "en-US",
        suffix = "",
        direction = "both",
        randomSpin = false,
        cents = false,
        counter = false,
        style,
      }) {
        // Track the previous value so counter mode can roll from it (updated
        // after commit, not during render).
        const prevRef = useRef(typeof value === "number" ? value : 0);
        useEffect(() => {
          if (typeof value === "number") prevRef.current = value;
        });

        // Memoized so the odometer arrays keep a stable identity across
        // unrelated re-renders (only changing when the value does), so an
        // in-progress roll isn't wiped by, e.g., the auto-cycling card above.
        const plan = useMemo(() => {
          if (typeof value !== "number" && typeof value !== "bigint") return null;
          const opts = cents
            ? { ...format, minimumFractionDigits: 2, maximumFractionDigits: 2 }
            : format || {};
          const parts = new Intl.NumberFormat(locales, opts).formatToParts(value);
          let head = "", frac = "", intDigits = 0;
          for (const p of parts) {
            if (p.type === "fraction") frac += p.value;
            else head += p.value;
            if (p.type === "integer") intDigits += p.value.length;
          }
          const fracDigits = frac.length;
          const headFrom = [], headCycles = [], fracFrom = [], fracCycles = [];
          let odometerDir = direction;
          const odometer =
            counter && typeof value === "number" && Number.isFinite(value);
          if (odometer) {
            const scale = 10 ** fracDigits;
            const cur = Math.round(value * scale);
            const prev = Math.round(prevRef.current * scale);
            odometerDir = cur >= prev ? "up" : "down";
            let i = 0;
            for (const p of parts) {
              if (p.type === "integer")
                for (const _ of p.value) {
                  const d = odometerDigit(prev, cur, intDigits - 1 - i++ + fracDigits);
                  headFrom.push(d.from);
                  headCycles.push(d.cycles);
                }
              else if (p.type === "fraction")
                for (let k = 0; k < p.value.length; k++) {
                  const d = odometerDigit(prev, cur, fracDigits - 1 - k);
                  fracFrom.push(d.from);
                  fracCycles.push(d.cycles);
                }
            }
          }
          return {
            head, frac, headFrom, headCycles, fracFrom, fracCycles,
            allFrom: [...headFrom, ...fracFrom],
            allCycles: [...headCycles, ...fracCycles],
            odometerDir, odometer,
          };
        }, [value, format, locales, cents, counter, direction]);

        // A preformatted string passes through verbatim — no part-aware features.
        if (plan === null) {
          return (
            <SlotText
              text={String(value) + suffix}
              direction={direction}
              randomSpin={randomSpin}
              style={style}
            />
          );
        }

        const { head, frac, odometer, odometerDir } = plan;
        // Counter mode spins low digits fast; its gentler settle reads better.
        const easing = counter ? SLOT_EASING_SOFT : undefined;

        // Without the cents treatment the whole number is a single reel.
        if (!cents || !frac) {
          return (
            <SlotText
              text={head + frac + suffix}
              direction={odometerDir}
              randomSpin={randomSpin}
              digitCycles={odometer ? plan.allCycles : undefined}
              digitFrom={odometer ? plan.allFrom : undefined}
              easing={easing}
              style={style}
            />
          );
        }

        // Cents: a smaller fractional reel baseline-aligned beside the integer
        // part; one labelled container so it reads as a single number.
        return (
          <span
            role="img"
            aria-label={head + frac + suffix}
            style={{ display: "inline-block", ...style }}
          >
            <SlotText
              text={head}
              direction={odometerDir}
              randomSpin={randomSpin}
              digitCycles={odometer ? plan.headCycles : undefined}
              digitFrom={odometer ? plan.headFrom : undefined}
              easing={easing}
            />
            <SlotText
              text={frac}
              direction={odometerDir}
              randomSpin={randomSpin}
              digitCycles={odometer ? plan.fracCycles : undefined}
              digitFrom={odometer ? plan.fracFrom : undefined}
              easing={easing}
              style={{ fontSize: "0.9em" }}
            />
            {suffix ? <span>{suffix}</span> : null}
          </span>
        );
      }

      // ---- demo plumbing ----------------------------------------------------
      const STRINGS = {
        en: {
          lang: "中文",
          tagline:
            "Slot-machine-style rolls for numbers, letters, and text in React. Dependency-free, accessible, reduced-motion aware.",
          theme: "Theme",
          direction: "Direction",
          dir: { both: "Both", up: "Up", down: "Down" },
          randomSpin: "Random spin",
          counter: "Counter",
          scrub: "Value",
          onOff: { off: "Off", on: "On" },
          numberEyebrow: "SlotNumber",
          numberCtx: "Any number type — currency, percent, compact, negatives — via Intl.NumberFormat. Digits roll; the cents roll smaller and bottom-aligned.",
          counterEyebrow: "SlotNumber · Counter",
          counterCtx: "Scrub the slider: the low digits blur like a gear-reduction counter while the ten-thousands and up turn slowly. It rolls only while you scrub.",
          letterEyebrow: "SlotLetter",
          letterCtx: "A single character rolling through its alphabet, wrapping around.",
          textEyebrow: "SlotText",
          textCtx: "Any script — Latin, Japanese, Traditional Chinese. Each grapheme rolls; spacing stays natural.",
          install: "Install",
          usage: "Usage",
        },
        zh: {
          lang: "EN",
          tagline:
            "為 React 打造的拉霸機式數字滾動效果。零依賴、可存取、並支援減少動態偏好。",
          theme: "主題",
          direction: "方向",
          dir: { both: "雙向", up: "向上", down: "向下" },
          randomSpin: "隨機滾動",
          counter: "計數器",
          scrub: "數值",
          onOff: { off: "關", on: "開" },
          numberEyebrow: "SlotNumber",
          numberCtx: "任何數字類型——貨幣、百分比、精簡格式、負數——透過 Intl.NumberFormat。數字滾動；角分以較小字級並靠底對齊滾動。",
          counterEyebrow: "SlotNumber · 計數器",
          counterCtx: "拖動滑桿：低位數字像減速齒輪計數器般飛轉，萬位以上則緩緩轉動。僅在拖動時滾動。",
          letterEyebrow: "SlotLetter",
          letterCtx: "單一字元在字母表中循環滾動。",
          textEyebrow: "SlotText",
          textCtx: "任何文字——拉丁、日文、繁體中文。每個字元各自滾動，排版自然。",
          install: "安裝",
          usage: "用法",
        },
      };

      // Usage snippets shown in each card's "?" tooltip (code, not localized).
      const USAGE = {
        number:
          '<SlotNumber value={1234.56} format={{ style: "currency", currency: "USD" }} cents />',
        counter:
          '<SlotNumber value={value} format={{ style: "currency", currency: "USD" }} cents counter />',
        letter: '<SlotLetter char="Q" direction="down" />',
        text: '<SlotText text="東京タワー" direction="both" />',
      };

      const NUMBERS = [1234.56, 13190.05, 597.99, 5970000.5, 81293.2, 42.07];
      const LETTERS = ["A", "Q", "Z", "M", "E", "R", "S"];
      // English mode mixes Latin (incl. a Title-case word), Japanese, and
      // Traditional Chinese; Mandarin mode spins everyday Traditional Chinese.
      const WORDS_EN = ["VOYAGE", "Harbor", "QUARTZ", "GARDEN", "東京タワー", "臺灣"];
      const WORDS_ZH = ["春天", "圖書館", "海洋", "音樂會", "故宮"];
      const PAUSE = 1900;

      function useCycle(values) {
        const [i, setI] = useState(0);
        useEffect(() => {
          const id = setInterval(
            () => setI((p) => (p + 1) % values.length),
            PAUSE,
          );
          return () => clearInterval(id);
        }, [values.length]);
        return values[i % values.length];
      }

      function DirectionControl({ value, onChange, t }) {
        return (
          <div>
            <span className="seg-label">{t.direction}</span>
            <div className="seg" role="group" aria-label={t.direction}>
              {["both", "up", "down"].map((o) => (
                <button
                  key={o}
                  type="button"
                  className={"seg-btn" + (value === o ? " active" : "")}
                  aria-pressed={value === o}
                  onClick={() => onChange(o)}
                >
                  {t.dir[o]}
                </button>
              ))}
            </div>
          </div>
        );
      }

      function ToggleControl({ value, onChange, label, t }) {
        return (
          <div>
            <span className="seg-label">{label}</span>
            <div className="seg" role="group" aria-label={label}>
              {[false, true].map((v) => (
                <button
                  key={String(v)}
                  type="button"
                  className={"seg-btn" + (value === v ? " active" : "")}
                  aria-pressed={value === v}
                  onClick={() => onChange(v)}
                >
                  {v ? t.onOff.on : t.onOff.off}
                </button>
              ))}
            </div>
          </div>
        );
      }

      // The "?" usage tooltip shared by every card header.
      function HelpTip({ eyebrow, usage, t }) {
        const tipId = "tip-" + eyebrow;
        return (
          <span className="help">
            <button
              type="button"
              className="help-btn"
              aria-label={t.usage}
              aria-describedby={tipId}
            >
              <span className="help-dot" aria-hidden="true">
                ?
              </span>
            </button>
            <span className="tip" role="tooltip" id={tipId}>
              <span className="tip-label">{t.usage}</span>
              <code className="tip-code">{usage}</code>
            </span>
          </span>
        );
      }

      function DemoCard({
        eyebrow,
        context,
        dir,
        setDir,
        randomSpin,
        setRandomSpin,
        t,
        usage,
        children,
      }) {
        return (
          <section className="card">
            <div className="card-head">
              <p className="eyebrow">{eyebrow}</p>
              <HelpTip eyebrow={eyebrow} usage={usage} t={t} />
            </div>
            <div className="hero">{children}</div>
            <p className="context">{context}</p>
            <div className="controls">
              <DirectionControl value={dir} onChange={setDir} t={t} />
              <ToggleControl
                value={randomSpin}
                onChange={setRandomSpin}
                label={t.randomSpin}
                t={t}
              />
            </div>
          </section>
        );
      }

      // e × 10^6 → π × 10^6, in integer cents (avoids slider float drift).
      const COUNTER_MIN = 271828182; // $2,718,281.82
      const COUNTER_MAX = 314159265; // $3,141,592.65
      const MONEY_FMT = { style: "currency", currency: "USD" };

      // Scrubbable odometer. Counter mode rolls from the previous value, so it
      // sits still on load and rolls only as the slider moves — the low digits
      // blurring while the ten-thousands and up barely turn.
      function CounterDemo({ t }) {
        const [cents, setCents] = useState(COUNTER_MIN);
        const [counter, setCounter] = useState(true);
        return (
          <section className="card">
            <div className="card-head">
              <p className="eyebrow">{t.counterEyebrow}</p>
              <HelpTip eyebrow={t.counterEyebrow} usage={USAGE.counter} t={t} />
            </div>
            <div className="hero">
              <SlotNumber
                value={cents / 100}
                format={MONEY_FMT}
                cents
                counter={counter}
                randomSpin={false}
              />
            </div>
            <p className="context">{t.counterCtx}</p>
            <div className="controls">
              <div className="slider-wrap">
                <span className="seg-label">{t.scrub}</span>
                <input
                  type="range"
                  className="slider"
                  min={COUNTER_MIN}
                  max={COUNTER_MAX}
                  step="1"
                  value={cents}
                  onChange={(e) => setCents(+e.target.value)}
                  aria-label={t.scrub}
                />
              </div>
              <ToggleControl
                value={counter}
                onChange={setCounter}
                label={t.counter}
                t={t}
              />
            </div>
          </section>
        );
      }

      const store = {
        get(k, fb) {
          try {
            return localStorage.getItem(k) ?? fb;
          } catch {
            return fb;
          }
        },
        set(k, v) {
          try {
            localStorage.setItem(k, v);
          } catch {}
        },
      };

      function App() {
        const [theme, setTheme] = useState(() => store.get("se-theme", "dark"));
        const [lang, setLang] = useState(() => store.get("se-lang", "en"));
        const [numDir, setNumDir] = useState("both");
        const [letterDir, setLetterDir] = useState("both");
        const [textDir, setTextDir] = useState("both");
        const [numRandom, setNumRandom] = useState(false);
        const [letterRandom, setLetterRandom] = useState(false);
        const [textRandom, setTextRandom] = useState(false);

        useEffect(() => {
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.setAttribute("lang", lang);
          store.set("se-theme", theme);
          store.set("se-lang", lang);
        }, [theme, lang]);

        const t = STRINGS[lang];
        const numValue = useCycle(NUMBERS);
        const letterValue = useCycle(LETTERS);
        const textValue = useCycle(lang === "zh" ? WORDS_ZH : WORDS_EN);

        return (
          <React.Fragment>
            <header className="site">
              <div>
                <h1 className="wordmark">sloteffect</h1>
                <p className="tagline">{t.tagline}</p>
              </div>
              <div className="toolbar">
                <button
                  type="button"
                  className="lang-btn"
                  onClick={() => setLang(lang === "en" ? "zh" : "en")}
                  aria-label="Toggle language"
                >
                  {t.lang}
                </button>
                <button
                  type="button"
                  className="icon-btn"
                  onClick={() => setTheme(theme === "dark" ? "light" : "dark")}
                  aria-label={t.theme}
                >
                  {theme === "dark" ? "☀" : "☾"}
                </button>
              </div>
            </header>

            <DemoCard
              eyebrow={t.numberEyebrow}
              context={t.numberCtx}
              dir={numDir}
              setDir={setNumDir}
              randomSpin={numRandom}
              setRandomSpin={setNumRandom}
              usage={USAGE.number}
              t={t}
            >
              <SlotNumber
                value={numValue}
                format={{ style: "currency", currency: "USD" }}
                cents
                direction={numDir}
                randomSpin={numRandom}
              />
            </DemoCard>

            <CounterDemo t={t} />

            <DemoCard
              eyebrow={t.textEyebrow}
              context={t.textCtx}
              dir={textDir}
              setDir={setTextDir}
              randomSpin={textRandom}
              setRandomSpin={setTextRandom}
              usage={USAGE.text}
              t={t}
            >
              <SlotText text={textValue} direction={textDir} randomSpin={textRandom} />
            </DemoCard>

            <DemoCard
              eyebrow={t.letterEyebrow}
              context={t.letterCtx}
              dir={letterDir}
              setDir={setLetterDir}
              randomSpin={letterRandom}
              setRandomSpin={setLetterRandom}
              usage={USAGE.letter}
              t={t}
            >
              <SlotLetter
                char={letterValue}
                direction={letterDir}
                randomSpin={letterRandom}
              />
            </DemoCard>

            <footer className="site">
              <a href="https://www.npmjs.com/package/sloteffect">npm</a>
              <a href="https://github.com/jauderho/sloteffect">GitHub</a>
              <span style={{ color: "var(--text3)" }}>
                {t.install}: <code>npm i sloteffect</code>
              </span>
            </footer>
          </React.Fragment>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
