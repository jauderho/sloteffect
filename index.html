<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sloteffect — slot-machine rolls for React</title>
    <meta
      name="description"
      content="Slot-machine-style rolls for numbers, letters, and text in React. Dependency-free, accessible, reduced-motion aware."
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@400;500;600;700&display=swap");

      :root[data-theme="dark"] {
        --bg: #0a0b0d;
        --surface: #15181d;
        --surface2: #1b1f26;
        --border: #262b34;
        --border2: #333a45;
        --text: #f4f3f0;
        --text2: #b9bcc4;
        --text3: #7e8390;
        --gold: #d4b87a;
        --gold-bg: rgba(212, 184, 122, 0.1);
        --on-gold: #1a1408;
        --good: #5ed6a4;
      }
      :root[data-theme="light"] {
        --bg: #f7f4ee;
        --surface: #ffffff;
        --surface2: #f3efe6;
        --border: #e2dccf;
        --border2: #d4ccbb;
        --text: #1a1814;
        --text2: #4b4742;
        --text3: #857f74;
        --gold: #9a7b2e;
        --gold-bg: rgba(154, 123, 46, 0.08);
        --on-gold: #ffffff;
        --good: #1f8a5b;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Hanken Grotesk", "Noto Sans TC", ui-sans-serif,
          system-ui, sans-serif;
        font-variant-numeric: tabular-nums;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
        transition: background 0.25s ease, color 0.25s ease;
      }
      :lang(zh) {
        font-family: "Noto Sans TC", "Hanken Grotesk", ui-sans-serif,
          system-ui, sans-serif;
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: clamp(20px, 5vw, 48px) clamp(16px, 4vw, 28px) 64px;
      }

      header.site {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: clamp(28px, 6vw, 48px);
      }
      .wordmark {
        font-family: "Newsreader", "Noto Serif TC", serif;
        font-weight: 500;
        font-size: clamp(28px, 5vw, 42px);
        letter-spacing: -0.01em;
        margin: 0;
        line-height: 1.1;
      }
      .tagline {
        color: var(--text2);
        font-size: 14px;
        margin: 6px 0 0;
        max-width: 46ch;
      }

      .toolbar {
        display: flex;
        gap: 8px;
      }
      .icon-btn,
      .lang-btn {
        min-height: 44px;
        min-width: 44px;
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        background: var(--surface2);
        color: var(--text2);
        border: 1px solid var(--border);
        border-radius: 10px;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease,
          border-color 0.15s ease;
      }
      .icon-btn:hover,
      .lang-btn:hover {
        border-color: var(--border2);
        color: var(--text);
      }
      :focus-visible {
        outline: 2px solid var(--gold);
        outline-offset: 2px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid var(--gold);
        border-radius: 16px;
        padding: clamp(20px, 4vw, 28px);
        margin-bottom: 20px;
      }
      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 0 0 14px;
      }
      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--gold);
        margin: 0;
      }
      .help {
        position: relative;
      }
      .help-btn {
        width: 44px;
        height: 44px;
        min-height: 44px;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: help;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .help-dot {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 1px solid var(--border2);
        background: var(--surface2);
        color: var(--text3);
        font-size: 13px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: color 0.15s ease, border-color 0.15s ease;
      }
      .help-btn:hover .help-dot,
      .help-btn:focus-visible .help-dot {
        color: var(--gold);
        border-color: var(--gold);
      }
      .tip {
        position: absolute;
        right: 0;
        top: calc(100% - 6px);
        z-index: 5;
        width: max-content;
        max-width: min(360px, 78vw);
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 12.5px;
        line-height: 1.55;
        color: var(--text2);
        white-space: normal;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-4px);
        transition: opacity 0.15s ease, transform 0.15s ease,
          visibility 0.15s ease;
      }
      code {
        font-family: inherit;
      }
      .tip-code {
        display: block;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        color: var(--text);
        word-break: break-word;
      }
      .tip-label {
        display: block;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text3);
        margin: 0 0 8px;
      }
      .help:hover .tip,
      .help:focus-within .tip {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }
      .hero {
        font-family: "Newsreader", "Noto Serif TC", serif;
        font-weight: 500;
        font-size: clamp(40px, 11vw, 72px);
        line-height: 1.2;
        color: var(--text);
        min-height: 1.2em;
        display: flex;
        align-items: center;
      }
      .context {
        color: var(--text2);
        font-size: 14px;
        margin: 10px 0 18px;
        min-height: 1.4em;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: flex-end;
        gap: 20px 32px;
      }
      /* Random-spin toggle sits at the lower right; its labels align right. */
      .controls > div:last-child {
        text-align: right;
      }
      .seg {
        display: inline-flex;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 4px;
        gap: 4px;
      }
      .seg-btn {
        min-height: 36px;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--text2);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .seg-btn:hover {
        color: var(--text);
      }
      .seg-btn.active {
        background: var(--gold);
        color: var(--on-gold);
      }
      .seg-label {
        display: block;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text3);
        margin: 0 0 8px;
      }

      footer.site {
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        font-size: 13px;
      }
      footer.site a {
        color: var(--text2);
        text-decoration: none;
        font-weight: 600;
      }
      footer.site a:hover {
        color: var(--gold);
      }

      @media (max-width: 480px) {
        .seg {
          width: 100%;
        }
        .seg-btn {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root" class="wrap"></div>

    <script
      crossorigin
      src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef, useLayoutEffect } = React;

      // ---- sloteffect (inline port of src/, kept in sync) -------------------
      const DIGITS = "0123456789";
      const UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const LOWER = "abcdefghijklmnopqrstuvwxyz";
      const ROW_H = 1.3;
      const SLOT_EASING =
        "linear(0, 0.0208, 0.0752, 0.1525, 0.2439, 0.3422, 0.4417, 0.5382, 0.6286, " +
        "0.711, 0.7839, 0.847, 0.9002, 0.944, 0.9789, 1.0058, 1.0257, 1.0395, " +
        "1.0483, 1.0529, 1.0543, 1.0532, 1.0502, 1.046, 1.041, 1.0357, 1.0303, " +
        "1.0251, 1.0202, 1.0157, 1.0117, 1.0083, 1.0054, 1.003, 1.0011, 0.9997, " +
        "0.9986, 0.9979, 0.9974, 0.9971, 0.9971, 0.9971, 0.9973, 0.9975, 0.9978, " +
        "0.9981, 0.9984, 0.9986, 0.9989, 0.9991, 0.9994, 0.9995, 0.9997, 0.9998, " +
        "0.9999, 1, 1.0001, 1.0001, 1.0001, 1.0002, 1)";

      function charsetOf(ch) {
        if (ch >= "0" && ch <= "9") return DIGITS;
        if (ch >= "A" && ch <= "Z") return UPPER;
        if (ch >= "a" && ch <= "z") return LOWER;
        return null;
      }
      function sharedCharset(from, to) {
        const cs = charsetOf(from);
        return cs && cs === charsetOf(to) ? cs : null;
      }
      function forwardPath(cs, from, to) {
        const len = cs.length, fi = cs.indexOf(from), ti = cs.indexOf(to);
        const steps = (ti - fi + len) % len || len;
        const rows = [];
        for (let k = 0; k <= steps; k++) rows.push(cs[(fi + k) % len]);
        return rows;
      }
      function backwardPath(cs, from, to) {
        const len = cs.length, fi = cs.indexOf(from), ti = cs.indexOf(to);
        const steps = (fi - ti + len) % len || len;
        const rows = [];
        for (let k = 0; k <= steps; k++) rows.push(cs[(fi - k + len) % len]);
        return rows;
      }
      function buildRoll(from, to, direction, coin, fill = []) {
        const rollUp = direction === "both" ? coin < 0.5 : direction === "up";
        const cs = sharedCharset(from, to);
        const path = cs
          ? rollUp
            ? forwardPath(cs, from, to)
            : backwardPath(cs, from, to)
          : [from, ...fill, to];
        if (rollUp) return { rows: path, startRow: 0, endRow: path.length - 1 };
        const rows = path.slice().reverse();
        return { rows, startRow: rows.length - 1, endRow: 0 };
      }
      const rollDuration = (coin = Math.random()) => 750 + coin * 300;
      function hashSeed(str) {
        let h = 2166136261;
        for (let i = 0; i < str.length; i++) {
          h ^= str.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      }
      function makeRng(seed) {
        let s = seed >>> 0;
        return () => {
          s = (s + 0x6d2b79f5) | 0;
          let t = Math.imul(s ^ (s >>> 15), 1 | s);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      const STEADY_COIN = 0.5;
      const prefersReducedMotion = () =>
        window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const SPIN_LENGTH = 6;
      const DEFAULT_SPIN_POOL =
        "的一是不了人我在有他這為之大來以個中上們到說國和地也子時道出而要於就下得可你年生自會那後能對著事其裡所去行過家十用發天如然作方成者多日都三小軍二無同麼經法當起與好看學進種將還分此心前面又定見只主沒公從金東風花雨山水火土木月日星雲海";
      function isIdeograph(ch) {
        const cp = ch.codePointAt(0) || 0;
        return (
          (cp >= 0x3400 && cp <= 0x9fff) ||
          (cp >= 0xf900 && cp <= 0xfaff) ||
          (cp >= 0x20000 && cp <= 0x2fa1f)
        );
      }
      const isEmoji = (ch) => /\p{Extended_Pictographic}/u.test(ch);
      // A reel only rolls between graphemes of the same kind, and never for the
      // non-rolling kinds emoji/symbol — so currency symbols, separators, and
      // emoji always swap statically while letters and ideographs roll/flip.
      function glyphKind(ch) {
        if (isEmoji(ch)) return "emoji";
        const cs = charsetOf(ch);
        if (cs) return cs;
        if (isIdeograph(ch)) return "ideograph";
        return /\p{Letter}/u.test(ch) ? "letter" : "symbol";
      }
      const STATIC_KINDS = new Set(["emoji", "symbol"]);
      function sampleSpin(pool, n, rand = Math.random) {
        const chars = Array.from(pool);
        const out = [];
        for (let i = 0; i < n; i++)
          out.push(chars[Math.floor(rand() * chars.length)]);
        return out;
      }
      function randomGlyph(pool, exclude = "", rand = Math.random) {
        const choices = pool.filter((g) => g !== exclude);
        const from = choices.length ? choices : pool;
        return from[Math.floor(rand() * from.length)] ?? "";
      }
      // Decide how `target` animates from the aligned previous grapheme
      // `source`: same-kind sources roll from their real value, otherwise a
      // same-kind start glyph is synthesized so every changed grapheme spins.
      // Emoji, symbols, and unchanged graphemes return null (shown statically).
      function chooseReel(target, source, letterPool, spinPool, rand = Math.random) {
        const kind = glyphKind(target);
        if (STATIC_KINDS.has(kind)) return null;
        const cs = charsetOf(target);
        const usable =
          source && !isEmoji(source) && glyphKind(source) === kind;
        const from = usable
          ? source
          : randomGlyph(
              cs
                ? Array.from(cs)
                : isIdeograph(target)
                  ? Array.from(spinPool)
                  : letterPool,
              target,
              rand,
            );
        if (!from || from === target) return null;
        const fill = cs
          ? []
          : isIdeograph(target)
            ? sampleSpin(spinPool, SPIN_LENGTH, rand)
            : sampleSpin(letterPool.join(""), SPIN_LENGTH, rand);
        return { from, fill };
      }

      const ROW_CSS =
        "display:block;height:" +
        ROW_H +
        "em;line-height:" +
        ROW_H +
        ";white-space:pre";

      function segmentWithOffsets(text) {
        const out = [];
        if (typeof Intl !== "undefined" && "Segmenter" in Intl) {
          const seg = new Intl.Segmenter(undefined, { granularity: "grapheme" });
          for (const s of seg.segment(text))
            out.push({ g: s.segment, start: s.index });
          return out;
        }
        let i = 0;
        for (const ch of text) {
          out.push({ g: ch, start: i });
          i += ch.length;
        }
        return out;
      }

      // Resting text is one kerned run; on change, overlay measured reels at each
      // grapheme's real (kerned) box so spacing/kerning/RTL match normal text.
      function resolveBackground(el) {
        let node = el;
        while (node) {
          const bg = getComputedStyle(node).backgroundColor;
          if (bg && bg !== "transparent" && !bg.startsWith("rgba(0, 0, 0, 0"))
            return bg;
          node = node.parentElement;
        }
        return getComputedStyle(document.body).backgroundColor || "#fff";
      }

      function SlotText({
        text,
        direction = "both",
        dir = "auto",
        spinPool = DEFAULT_SPIN_POOL,
        randomSpin = false,
        style,
      }) {
        const label = String(text);
        const hostRef = useRef(null);
        const textRef = useRef(null);
        const layerRef = useRef(null);
        const cellsRef = useRef([]);

        useLayoutEffect(() => {
          const host = hostRef.current;
          const textEl = textRef.current;
          const layer = layerRef.current;
          if (!host || !textEl || !layer) return;

          // Wipe the previous value's reels before spinning this one in.
          const wipe = () => {
            for (const c of cellsRef.current) {
              for (const a of c.getAnimations()) a.cancel();
              c.remove();
            }
            cellsRef.current = [];
          };
          wipe();

          const node = textEl.firstChild;
          if (!node || prefersReducedMotion()) {
            textEl.style.visibility = "visible";
            return wipe;
          }

          // Off → a per-value seed makes the roll identical every play; on →
          // truly random. Drives start glyph, spin glyphs, and direction.
          const rand = randomSpin ? Math.random : makeRng(hashSeed(label));

          const toG = segmentWithOffsets(label);
          const hostRect = host.getBoundingClientRect();
          const bg = resolveBackground(host);
          // Lift each reel cell by the row's half-leading so it sits exactly on
          // the measured glyph box.
          const lead =
            ((ROW_H - 1) / 2) * parseFloat(getComputedStyle(host).fontSize);

          // Other-script letters spin through this value's own same-kind glyphs.
          const letterPool = [
            ...new Set(
              toG.map((x) => x.g).filter((g) => glyphKind(g) === "letter"),
            ),
          ];

          // Measure every grapheme's kerned box first (reads), then build all
          // cells (writes), to avoid a forced reflow per glyph.
          const plans = [];
          for (const { g, start } of toG) {
            const reel = chooseReel(g, null, letterPool, spinPool, rand);
            if (!reel && g.trim() === "") continue; // whitespace: nothing to show
            const range = document.createRange();
            range.setStart(node, start);
            range.setEnd(node, start + g.length);
            plans.push({ g, reel, rect: range.getBoundingClientRect() });
          }

          // Hide the measured text; the cells are now the resting glyphs.
          textEl.style.visibility = "hidden";

          const cells = [];
          const at = (i) => `translateY(${-(i * ROW_H)}em)`;
          for (const { g, reel, rect } of plans) {
            const cell = document.createElement("span");
            cell.setAttribute("aria-hidden", "true");
            const left = rect.left - hostRect.left;
            const top = rect.top - hostRect.top;

            if (!reel) {
              // A symbol (currency, separator, punctuation): render statically.
              cell.style.cssText =
                "position:absolute;left:" +
                left +
                "px;top:" +
                top +
                "px;line-height:1;white-space:pre";
              cell.textContent = g;
              layer.appendChild(cell);
              cells.push(cell);
              continue;
            }

            cell.style.cssText =
              "position:absolute;left:" +
              left +
              "px;top:" +
              (top - lead) +
              "px;width:" +
              rect.width +
              "px;height:" +
              ROW_H +
              "em;overflow:hidden;background:" +
              bg;

            const { rows, startRow, endRow } = buildRoll(
              reel.from,
              g,
              direction,
              rand(),
              reel.fill,
            );
            const strip = document.createElement("span");
            strip.style.cssText =
              "position:absolute;left:0;top:0;width:100%;will-change:transform";
            for (const ch of rows) {
              const row = document.createElement("span");
              row.style.cssText = ROW_CSS;
              row.textContent = ch;
              strip.appendChild(row);
            }
            cell.appendChild(strip);
            // Land on the final glyph and stay — the reel is the rest state.
            strip.style.transform = at(endRow);
            // randomSpin staggers each settle; otherwise all settle as one.
            const duration = rollDuration(randomSpin ? Math.random() : STEADY_COIN);
            // Keep the strip promoted (will-change stays) so finishing never
            // triggers a layer de-promotion repaint (a final flicker).
            strip.animate(
              [{ transform: at(startRow) }, { transform: at(endRow) }],
              { duration, easing: SLOT_EASING },
            );
            layer.appendChild(cell);
            cells.push(cell);
          }

          cellsRef.current = cells;
          return wipe;
        }, [label, direction, spinPool, randomSpin]);

        return (
          <span
            ref={hostRef}
            role="img"
            aria-label={label}
            dir={dir}
            style={{
              position: "relative",
              display: "inline-block",
              whiteSpace: "pre",
              lineHeight: ROW_H,
              fontKerning: "normal",
              textRendering: "optimizeLegibility",
              ...style,
            }}
          >
            <span ref={textRef}>{label}</span>
            <span
              ref={layerRef}
              aria-hidden="true"
              style={{
                position: "absolute",
                left: 0,
                top: 0,
                pointerEvents: "none",
              }}
            />
          </span>
        );
      }

      function SlotLetter({
        char,
        direction = "both",
        spinPool,
        randomSpin = false,
        style,
      }) {
        const ch = Array.from(String(char))[0] ?? "";
        return (
          <SlotText
            text={ch}
            direction={direction}
            spinPool={spinPool}
            randomSpin={randomSpin}
            style={style}
          />
        );
      }

      function SlotNumber({
        value,
        format,
        locales = "en-US",
        suffix = "",
        direction = "both",
        randomSpin = false,
        style,
      }) {
        const formatted =
          typeof value === "string"
            ? value
            : new Intl.NumberFormat(locales, format).format(value);
        return (
          <SlotText
            text={formatted + suffix}
            direction={direction}
            randomSpin={randomSpin}
            style={style}
          />
        );
      }

      // ---- demo plumbing ----------------------------------------------------
      const STRINGS = {
        en: {
          lang: "中文",
          tagline:
            "Slot-machine-style rolls for numbers, letters, and text in React. Dependency-free, accessible, reduced-motion aware.",
          theme: "Theme",
          direction: "Direction",
          dir: { both: "Both", up: "Up", down: "Down" },
          randomSpin: "Random spin",
          onOff: { off: "Off", on: "On" },
          numberEyebrow: "SlotNumber",
          numberCtx: "Any number type — currency, percent, compact, negatives — via Intl.NumberFormat. Digits roll; symbols hold.",
          letterEyebrow: "SlotLetter",
          letterCtx: "A single character rolling through its alphabet, wrapping around.",
          textEyebrow: "SlotText",
          textCtx: "Any script — Latin, Japanese, Traditional Chinese. Each grapheme rolls; spacing stays natural.",
          install: "Install",
          usage: "Usage",
        },
        zh: {
          lang: "EN",
          tagline:
            "為 React 打造的拉霸機式數字滾動效果。零依賴、可存取、並支援減少動態偏好。",
          theme: "主題",
          direction: "方向",
          dir: { both: "雙向", up: "向上", down: "向下" },
          randomSpin: "隨機滾動",
          onOff: { off: "關", on: "開" },
          numberEyebrow: "SlotNumber",
          numberCtx: "任何數字類型——貨幣、百分比、精簡格式、負數——透過 Intl.NumberFormat。數字滾動，符號不動。",
          letterEyebrow: "SlotLetter",
          letterCtx: "單一字元在字母表中循環滾動。",
          textEyebrow: "SlotText",
          textCtx: "任何文字——拉丁、日文、繁體中文。每個字元各自滾動，排版自然。",
          install: "安裝",
          usage: "用法",
        },
      };

      // Usage snippets shown in each card's "?" tooltip (code, not localized).
      const USAGE = {
        number:
          '<SlotNumber value={1234} format={{ style: "currency", currency: "USD" }} direction="up" />',
        letter: '<SlotLetter char="Q" direction="down" />',
        text: '<SlotText text="東京タワー" direction="both" />',
      };

      const NUMBERS = [1234, 13190, 597, 5970000, 81293, 42];
      const LETTERS = ["A", "Q", "Z", "M", "E", "R", "S"];
      // English mode mixes Latin, Japanese, and Traditional Chinese; Mandarin
      // mode spins through everyday Traditional Chinese words.
      const WORDS_EN = ["VOYAGE", "QUARTZ", "GARDEN", "東京タワー", "臺灣"];
      const WORDS_ZH = ["春天", "圖書館", "海洋", "音樂會", "故宮"];
      const PAUSE = 1900;

      function useCycle(values) {
        const [i, setI] = useState(0);
        useEffect(() => {
          const id = setInterval(
            () => setI((p) => (p + 1) % values.length),
            PAUSE,
          );
          return () => clearInterval(id);
        }, [values.length]);
        return values[i % values.length];
      }

      function DirectionControl({ value, onChange, t }) {
        return (
          <div>
            <span className="seg-label">{t.direction}</span>
            <div className="seg" role="group" aria-label={t.direction}>
              {["both", "up", "down"].map((o) => (
                <button
                  key={o}
                  type="button"
                  className={"seg-btn" + (value === o ? " active" : "")}
                  aria-pressed={value === o}
                  onClick={() => onChange(o)}
                >
                  {t.dir[o]}
                </button>
              ))}
            </div>
          </div>
        );
      }

      function ToggleControl({ value, onChange, t }) {
        return (
          <div>
            <span className="seg-label">{t.randomSpin}</span>
            <div className="seg" role="group" aria-label={t.randomSpin}>
              {[false, true].map((v) => (
                <button
                  key={String(v)}
                  type="button"
                  className={"seg-btn" + (value === v ? " active" : "")}
                  aria-pressed={value === v}
                  onClick={() => onChange(v)}
                >
                  {v ? t.onOff.on : t.onOff.off}
                </button>
              ))}
            </div>
          </div>
        );
      }

      function DemoCard({
        eyebrow,
        context,
        dir,
        setDir,
        randomSpin,
        setRandomSpin,
        t,
        usage,
        children,
      }) {
        const tipId = "tip-" + eyebrow;
        return (
          <section className="card">
            <div className="card-head">
              <p className="eyebrow">{eyebrow}</p>
              <span className="help">
                <button
                  type="button"
                  className="help-btn"
                  aria-label={t.usage}
                  aria-describedby={tipId}
                >
                  <span className="help-dot" aria-hidden="true">
                    ?
                  </span>
                </button>
                <span className="tip" role="tooltip" id={tipId}>
                  <span className="tip-label">{t.usage}</span>
                  <code className="tip-code">{usage}</code>
                </span>
              </span>
            </div>
            <div className="hero">{children}</div>
            <p className="context">{context}</p>
            <div className="controls">
              <DirectionControl value={dir} onChange={setDir} t={t} />
              <ToggleControl value={randomSpin} onChange={setRandomSpin} t={t} />
            </div>
          </section>
        );
      }

      const store = {
        get(k, fb) {
          try {
            return localStorage.getItem(k) ?? fb;
          } catch {
            return fb;
          }
        },
        set(k, v) {
          try {
            localStorage.setItem(k, v);
          } catch {}
        },
      };

      function App() {
        const [theme, setTheme] = useState(() => store.get("se-theme", "dark"));
        const [lang, setLang] = useState(() => store.get("se-lang", "en"));
        const [numDir, setNumDir] = useState("both");
        const [letterDir, setLetterDir] = useState("both");
        const [textDir, setTextDir] = useState("both");
        const [numRandom, setNumRandom] = useState(false);
        const [letterRandom, setLetterRandom] = useState(false);
        const [textRandom, setTextRandom] = useState(false);

        useEffect(() => {
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.setAttribute("lang", lang);
          store.set("se-theme", theme);
          store.set("se-lang", lang);
        }, [theme, lang]);

        const t = STRINGS[lang];
        const numValue = useCycle(NUMBERS);
        const letterValue = useCycle(LETTERS);
        const textValue = useCycle(lang === "zh" ? WORDS_ZH : WORDS_EN);

        return (
          <React.Fragment>
            <header className="site">
              <div>
                <h1 className="wordmark">sloteffect</h1>
                <p className="tagline">{t.tagline}</p>
              </div>
              <div className="toolbar">
                <button
                  type="button"
                  className="lang-btn"
                  onClick={() => setLang(lang === "en" ? "zh" : "en")}
                  aria-label="Toggle language"
                >
                  {t.lang}
                </button>
                <button
                  type="button"
                  className="icon-btn"
                  onClick={() => setTheme(theme === "dark" ? "light" : "dark")}
                  aria-label={t.theme}
                >
                  {theme === "dark" ? "☀" : "☾"}
                </button>
              </div>
            </header>

            <DemoCard
              eyebrow={t.numberEyebrow}
              context={t.numberCtx}
              dir={numDir}
              setDir={setNumDir}
              randomSpin={numRandom}
              setRandomSpin={setNumRandom}
              usage={USAGE.number}
              t={t}
            >
              <SlotNumber
                value={numValue}
                format={{
                  style: "currency",
                  currency: "USD",
                  maximumFractionDigits: 0,
                }}
                direction={numDir}
                randomSpin={numRandom}
              />
            </DemoCard>

            <DemoCard
              eyebrow={t.textEyebrow}
              context={t.textCtx}
              dir={textDir}
              setDir={setTextDir}
              randomSpin={textRandom}
              setRandomSpin={setTextRandom}
              usage={USAGE.text}
              t={t}
            >
              <SlotText text={textValue} direction={textDir} randomSpin={textRandom} />
            </DemoCard>

            <DemoCard
              eyebrow={t.letterEyebrow}
              context={t.letterCtx}
              dir={letterDir}
              setDir={setLetterDir}
              randomSpin={letterRandom}
              setRandomSpin={setLetterRandom}
              usage={USAGE.letter}
              t={t}
            >
              <SlotLetter
                char={letterValue}
                direction={letterDir}
                randomSpin={letterRandom}
              />
            </DemoCard>

            <footer className="site">
              <a href="https://www.npmjs.com/package/sloteffect">npm</a>
              <a href="https://github.com/jauderho/sloteffect">GitHub</a>
              <span style={{ color: "var(--text3)" }}>
                {t.install}: <code>npm i sloteffect</code>
              </span>
            </footer>
          </React.Fragment>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
