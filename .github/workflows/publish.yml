# Publish to npm via OIDC Trusted Publishing (no token, with provenance).
#
# One-time setup on npmjs.com (see README): package Settings -> Publishing access
# -> "Trusted publisher" -> GitHub Actions, with this repository and the workflow
# filename "publish.yml". After that, publishing a GitHub Release runs this job
# and npm mints short-lived credentials from the OIDC token below.
name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-26.04
    permissions:
      contents: read
      id-token: write # OIDC token for Trusted Publishing + provenance
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          disable-telemetry: true
          # If a publish fails on a blocked endpoint, switch egress-policy to
          # "audit" for one run to discover the host, then add it here.
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            nodejs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # Fail fast if the tag and package.json disagree, so a mistagged release
      # can never publish the wrong version. (frozen-lockfile + build below guard
      # the lockfile and buildability.)
      - name: Verify version matches release tag
        if: github.event_name == 'release'
        run: |
          pkg="$(jq -r .version package.json)"
          tag="${GITHUB_REF_NAME#v}"
          echo "package.json=$pkg  tag=$tag"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::package.json version ($pkg) does not match release tag ($tag)"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify package contents
        run: npm publish --provenance --access public --dry-run

      # Trusted Publishing needs npm >= 11.5.1; Node 22 ships an older npm.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Publish
        run: npm publish --provenance --access public
